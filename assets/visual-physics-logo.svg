      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="54%" stop-color="#F2F0FF"/>
      <stop offset="100%" stop-color="#E9FBFF"/>
    </radialGradient>
    <radialGradient id="vp-core" cx="35%" cy="28%" r="76%">
      <stop offset="0%" stop-color="#BFA7FF"/>
      <stop offset="44%" stop-color="#7C5CFF"/>
      <stop offset="100%" stop-color="#4F46E5"/>
    </radialGradient>
    <linearGradient id="vp-purple" x1="126" y1="60" x2="365" y2="447" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5B4BFF"/>
